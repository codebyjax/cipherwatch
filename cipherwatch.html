<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherWatch — Visibility into Encrypted Threats</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #060d14;
  --bg1: #0a1520;
  --bg2: #0f1e2e;
  --bg3: #162436;
  --bg4: #1c2f42;
  --border: rgba(0,200,255,0.1);
  --border2: rgba(0,200,255,0.2);
  --cyan: #00c8ff;
  --cyan-dim: rgba(0,200,255,0.6);
  --cyan-glow: rgba(0,200,255,0.08);
  --green: #00ff88;
  --green-dim: rgba(0,255,136,0.7);
  --amber: #ffb800;
  --red: #ff4444;
  --purple: #a855f7;
  --text-primary: #c8dff0;
  --text-secondary: #5a8aaa;
  --text-dim: #2a4a5a;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { background: var(--bg0); font-family: var(--sans); color: var(--text-primary); overflow: hidden; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
  pointer-events: none; z-index: 9999;
}

/* TOP BAR */
.topbar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 46px;
  display: flex; align-items: center; gap: 16px;
  flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-mark {
  width: 26px; height: 26px;
  border: 1.5px solid var(--cyan);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 8px rgba(0,200,255,0.15);
  position: relative;
}
.logo-eye-outer {
  width: 12px; height: 7px;
  border: 1.5px solid var(--cyan);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.logo-eye-inner { width: 4px; height: 4px; background: var(--cyan); border-radius: 50%; }
.logo-name { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #fff; }
.logo-name span { color: var(--cyan); }
.topbar-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.topbar-stat { font-family: var(--mono); font-size: 10px; color: var(--text-secondary); white-space: nowrap; }
.topbar-stat b { color: var(--cyan); font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
.status-pill {
  font-family: var(--mono); font-size: 9px;
  padding: 3px 9px; border-radius: 20px;
  border: 1px solid rgba(0,255,136,0.3);
  color: var(--green); background: rgba(0,255,136,0.05);
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse-green 2s infinite; }
@keyframes pulse-green { 0%,100%{opacity:1} 50%{opacity:0.4} }
.clock { font-family: var(--mono); font-size: 10px; color: var(--text-secondary); }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }
.layout { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }

/* LEFT PANEL */
.left-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--bg1); }
.panel-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-title { font-family: var(--mono); font-size: 9px; color: var(--cyan); letter-spacing: 0.14em; }
.alert-count { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
.alert-count .c { color: var(--red); }
.alert-count .h { color: var(--amber); }
.alert-filters {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 5px; flex-shrink: 0;
}
.filter-btn {
  font-family: var(--mono); font-size: 8px; padding: 3px 7px;
  border-radius: 3px; border: 1px solid var(--border);
  color: var(--text-secondary); background: transparent; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.08em;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }
.alert-list { flex: 1; overflow-y: auto; }
.alert-list::-webkit-scrollbar { width: 2px; }
.alert-list::-webkit-scrollbar-thumb { background: var(--border2); }
.alert-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
  position: relative;
}
.alert-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.alert-item.sev-critical::before { background: var(--red); box-shadow: 0 0 6px var(--red); }
.alert-item.sev-high::before { background: var(--amber); }
.alert-item.sev-medium::before { background: var(--cyan); }
.alert-item:hover { background: var(--bg2); }
.alert-item.selected { background: var(--bg3); }
.alert-item-top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
.sev-badge {
  font-family: var(--mono); font-size: 7px; font-weight: 700;
  padding: 2px 5px; border-radius: 2px; letter-spacing: 0.08em; flex-shrink: 0;
}
.sev-badge.critical { background: rgba(255,68,68,0.12); color: var(--red); border: 1px solid rgba(255,68,68,0.28); }
.sev-badge.high { background: rgba(255,184,0,0.1); color: var(--amber); border: 1px solid rgba(255,184,0,0.28); }
.sev-badge.medium { background: rgba(0,200,255,0.07); color: var(--cyan); border: 1px solid rgba(0,200,255,0.2); }
.alert-name { font-family: var(--mono); font-size: 10px; color: var(--text-primary); font-weight: 500; line-height: 1.3; }
.alert-meta { font-family: var(--mono); font-size: 8px; color: var(--text-secondary); display: flex; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.alert-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.mitre-tag {
  font-family: var(--mono); font-size: 7px; padding: 1px 4px;
  border-radius: 2px; color: var(--purple); background: rgba(168,85,247,0.07);
  border: 1px solid rgba(168,85,247,0.18);
}
.score-tag {
  font-family: var(--mono); font-size: 7px; padding: 1px 4px;
  border-radius: 2px; color: var(--cyan-dim); background: var(--cyan-glow);
  border: 1px solid var(--border2);
}

/* RIGHT PANEL */
.right-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--bg0); }
.detail-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg1); display: flex; align-items: flex-start; justify-content: space-between;
  flex-shrink: 0; gap: 12px;
}
.detail-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.detail-title { font-family: var(--mono); font-size: 13px; color: #fff; font-weight: 500; }
.detail-sub { font-family: var(--mono); font-size: 9px; color: var(--text-secondary); }
.detail-actions { display: flex; gap: 6px; flex-shrink: 0; }
.action-btn {
  font-family: var(--mono); font-size: 8px; padding: 5px 10px;
  border-radius: 3px; border: 1px solid var(--border2); color: var(--cyan);
  background: var(--cyan-glow); cursor: pointer; letter-spacing: 0.06em; transition: all 0.12s; white-space: nowrap;
}
.action-btn:hover { background: rgba(0,200,255,0.15); }
.action-btn.danger { color: var(--red); border-color: rgba(255,68,68,0.28); background: rgba(255,68,68,0.05); }
.action-btn.danger:hover { background: rgba(255,68,68,0.12); }

.detail-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
.detail-body::-webkit-scrollbar { width: 2px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border2); }

.section-head {
  font-family: var(--mono); font-size: 8px; color: var(--cyan);
  letter-spacing: 0.16em; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.field-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.field-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 4px; padding: 9px 11px;
}
.field-label { font-family: var(--mono); font-size: 8px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.field-val { font-family: var(--mono); font-size: 11px; color: var(--text-primary); }
.field-val.red { color: var(--red); }
.field-val.amber { color: var(--amber); }
.field-val.cyan { color: var(--cyan); }
.field-val.green { color: #00ff88; }

.net-flow { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; }
.net-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-family: var(--mono); }
.net-row:last-child { margin-bottom: 0; }
.net-label { font-size: 8px; color: var(--text-dim); width: 80px; flex-shrink: 0; letter-spacing: 0.08em; }
.net-val { font-size: 10px; color: var(--text-primary); flex: 1; }
.net-flag { font-size: 7px; padding: 1px 5px; border-radius: 2px; flex-shrink: 0; }
.net-flag.bad { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.25); }
.net-flag.warn { background: rgba(255,184,0,0.1); color: var(--amber); border: 1px solid rgba(255,184,0,0.25); }
.net-flag.ok { background: rgba(0,255,136,0.05); color: rgba(0,255,136,0.7); border: 1px solid rgba(0,255,136,0.18); }

/* AI PANEL */
.ai-panel { background: var(--bg1); border: 1px solid rgba(0,200,255,0.14); border-radius: 4px; overflow: hidden; }
.ai-header {
  padding: 9px 13px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 9px;
  background: rgba(0,200,255,0.03);
}
.ai-icon { font-family: var(--mono); font-size: 12px; color: var(--cyan); }
.ai-title { font-family: var(--mono); font-size: 9px; color: var(--cyan); letter-spacing: 0.1em; }
.ai-status { margin-left: auto; font-family: var(--mono); font-size: 8px; color: var(--text-dim); }
.ai-status.thinking { color: var(--amber); animation: blink 0.9s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.ai-body { padding: 13px; }
.ai-start-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px; border: 1px dashed rgba(0,200,255,0.18); border-radius: 4px;
  cursor: pointer; font-family: var(--mono); font-size: 10px;
  color: var(--text-secondary); background: transparent; transition: all 0.2s; width: 100%;
}
.ai-start-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }
.ai-steps { display: flex; flex-direction: column; }
.ai-step {
  display: flex; gap: 11px; padding: 9px 0;
  border-bottom: 1px solid rgba(0,200,255,0.05);
  opacity: 0; transform: translateY(5px);
  transition: opacity 0.45s, transform 0.45s;
}
.ai-step.visible { opacity: 1; transform: translateY(0); }
.ai-step:last-child { border-bottom: none; }
.ai-step-num { font-family: var(--mono); font-size: 8px; color: var(--text-dim); width: 18px; flex-shrink: 0; padding-top: 2px; }
.ai-step-label { font-family: var(--mono); font-size: 8px; color: var(--cyan); margin-bottom: 4px; letter-spacing: 0.08em; }
.ai-step-text { font-family: var(--sans); font-size: 11px; color: var(--text-secondary); line-height: 1.6; }
.ai-step-text b { color: var(--text-primary); font-weight: 500; }
.hl { color: var(--amber); font-family: var(--mono); font-size: 10px; }
.fl-r { color: var(--red); font-family: var(--mono); font-size: 10px; }
.fl-g { color: rgba(0,255,136,0.7); font-family: var(--mono); font-size: 10px; }

.ai-verdict {
  margin-top: 10px; padding: 11px 13px; border-radius: 4px;
  opacity: 0; transition: opacity 0.5s;
}
.ai-verdict.visible { opacity: 1; }
.ai-verdict.malicious { background: rgba(255,68,68,0.06); border: 1px solid rgba(255,68,68,0.22); }
.ai-verdict.suspicious { background: rgba(255,184,0,0.05); border: 1px solid rgba(255,184,0,0.18); }
.ai-verdict.benign { background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.14); }
.verdict-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; margin-bottom: 6px; }
.verdict-label.malicious { color: var(--red); }
.verdict-label.suspicious { color: var(--amber); }
.verdict-label.benign { color: rgba(0,255,136,0.7); }
.verdict-text { font-family: var(--sans); font-size: 11px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
.verdict-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.verdict-action {
  font-family: var(--mono); font-size: 8px; padding: 4px 9px;
  border-radius: 2px; letter-spacing: 0.06em; cursor: pointer;
}
.verdict-action.red { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.28); }
.verdict-action.amber { background: rgba(255,184,0,0.08); color: var(--amber); border: 1px solid rgba(255,184,0,0.28); }
.verdict-action.cyan { background: var(--cyan-glow); color: var(--cyan); border: 1px solid var(--border2); }

/* EMPTY STATE */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
.empty-big { font-family: var(--mono); font-size: 28px; color: var(--text-dim); opacity: 0.4; }
.empty-text { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-mark"><div class="logo-eye-outer"><div class="logo-eye-inner"></div></div></div>
      <div class="logo-name">Cipher<span>Watch</span></div>
    </div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat">SENSOR <b>so-sensor-01</b></div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat">NODE <b>172.16.0.5</b></div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat">FRAMEWORK <b>ZTA · AI-IDS · ETA</b></div>
    <div class="topbar-right">
      <div class="status-pill"><div class="status-dot"></div>ENGINE ACTIVE</div>
      <div class="clock" id="clock">--:--:-- UTC</div>
    </div>
  </div>

  <div class="layout">
    <div class="left-panel">
      <div class="panel-header">
        <div class="panel-title">// alert queue</div>
        <div class="alert-count"><span class="c">2 CRIT</span> &nbsp;·&nbsp; <span class="h">3 HIGH</span> &nbsp;·&nbsp; 2 MED</div>
      </div>
      <div class="alert-filters">
        <button class="filter-btn active" onclick="filterAlerts('all',this)">ALL</button>
        <button class="filter-btn" onclick="filterAlerts('critical',this)">CRITICAL</button>
        <button class="filter-btn" onclick="filterAlerts('high',this)">HIGH</button>
        <button class="filter-btn" onclick="filterAlerts('medium',this)">MEDIUM</button>
      </div>
      <div class="alert-list" id="alert-list"></div>
    </div>

    <div class="right-panel" id="right-panel">
      <div class="empty-state">
        <div class="empty-big">◎</div>
        <div class="empty-text">SELECT AN ALERT TO INVESTIGATE</div>
      </div>
    </div>
  </div>
</div>

let currentFilter = 'all';
let selectedId = null;
let aiRunning = false;

function renderAlerts() {
  const list = document.getElementById('alert-list');
  const filtered = currentFilter === 'all' ? alerts : alerts.filter(a => a.sev === currentFilter);
  list.innerHTML = filtered.map(a => `
    <div class="alert-item sev-${a.sev} ${selectedId===a.id?'selected':''}" onclick="selectAlert('${a.id}')">
      <div class="alert-item-top">
        <span class="sev-badge ${a.sev}">${a.sev.toUpperCase()}</span>
        <span class="alert-name">${a.name}</span>
      </div>
      <div class="alert-meta">
        <span>${a.ts}</span>
        <span>${a.src_ip}</span>
      </div>
      <div class="alert-tags">
        ${a.mitre.map(m=>`<span class="mitre-tag">${m}</span>`).join('')}
        <span class="score-tag">Score: ${a.score}</span>
      </div>
    </div>
  `).join('');
}

function selectAlert(id) {
  selectedId = id;
  aiRunning = false;
  renderAlerts();
  const a = alerts.find(x => x.id === id);
  renderDetail(a);
}

function severityColor(sev) {
  return sev === 'critical' ? 'var(--red)' : sev === 'high' ? 'var(--amber)' : 'var(--cyan)';
}

function renderDetail(a) {
  const sc = severityColor(a.sev);
  const protColor = (a.protocol.includes('1.1') || a.protocol.includes('1.0')) ? 'red' : '';
  const bytesColor = (parseFloat(a.bytes) > 100 && a.bytes.includes('MB')) ? 'amber' : '';
  const devColor = a.device_status.includes('Unmanaged') ? 'red' : a.device_status.includes('Pending') ? 'amber' : 'green';
  const ja3IsKnownBad = a.ja3.length === 32;
  const certBad = a.cert_cn === 'SELF-SIGNED';
  const certWarn = a.cert_issuer.includes('7 days') || a.cert_issuer.includes('14 days') || a.cert_issuer.includes('expired');

  document.getElementById('right-panel').innerHTML = `
    <div class="detail-header">
      <div style="flex:1;min-width:0">
        <div class="detail-title-row">
          <span class="sev-badge ${a.sev}">${a.sev.toUpperCase()}</span>
          <span class="detail-title">${a.name}</span>
        </div>
        <div class="detail-sub">${a.id} &nbsp;·&nbsp; ${a.ts} UTC &nbsp;·&nbsp; ${a.layer} &nbsp;·&nbsp; Score: <span style="color:${sc};font-family:var(--mono)">${a.score}/100</span></div>
      </div>
      <div class="detail-actions">
        <button class="action-btn">ASSIGN</button>
        <button class="action-btn">SUPPRESS</button>
        <button class="action-btn danger">ESCALATE</button>
      </div>
    </div>
    <div class="detail-body">
      <div>
        <div class="section-head">Network context</div>
        <div class="field-grid">
          <div class="field-box"><div class="field-label">Source IP</div><div class="field-val cyan">${a.src_ip}</div></div>
          <div class="field-box"><div class="field-label">Destination</div><div class="field-val">${a.dst_ip}</div></div>
          <div class="field-box"><div class="field-label">Dest Port</div><div class="field-val">${a.dst_port}</div></div>
          <div class="field-box"><div class="field-label">Protocol</div><div class="field-val ${protColor}">${a.protocol}</div></div>
          <div class="field-box"><div class="field-label">Bytes Transferred</div><div class="field-val ${bytesColor}">${a.bytes}</div></div>
          <div class="field-box"><div class="field-label">Duration</div><div class="field-val">${a.duration}</div></div>
        </div>
      </div>

      <div>
        <div class="section-head">TLS / ETA signals</div>
        <div class="net-flow">
          <div class="net-row">
            <span class="net-label">JA3 HASH</span>
            <span class="net-val" style="color:${ja3IsKnownBad?'var(--red)':'rgba(0,255,136,0.7)'}">${a.ja3}</span>
            ${ja3IsKnownBad ? '<span class="net-flag bad">THREAT INTEL HIT</span>' : '<span class="net-flag ok">KNOWN GOOD</span>'}
          </div>
          <div class="net-row"><span class="net-label">JA3S HASH</span><span class="net-val">${a.ja3s}</span></div>
          <div class="net-row">
            <span class="net-label">CERT CN</span>
            <span class="net-val" style="${certBad?'color:var(--red)':''}">${a.cert_cn}</span>
            ${certBad ? '<span class="net-flag bad">SELF-SIGNED</span>' : ''}
          </div>
          <div class="net-row">
            <span class="net-label">CERT ISSUER</span>
            <span class="net-val">${a.cert_issuer}</span>
            ${certWarn ? '<span class="net-flag warn">SHORT-LIVED</span>' : ''}
          </div>
          <div class="net-row"><span class="net-label">CERT SANs</span><span class="net-val">${a.cert_san}</span></div>
        </div>
      </div>

      <div>
        <div class="section-head">Identity &amp; device (ZTA)</div>
        <div class="field-grid">
          <div class="field-box" style="grid-column:span 2"><div class="field-label">Authenticated User</div><div class="field-val cyan">${a.user}</div></div>
          <div class="field-box"><div class="field-label">MITRE ATT&amp;CK</div><div class="field-val" style="font-size:9px;color:var(--purple)">${a.mitre.length ? a.mitre.join(' · ') : '— none mapped'}</div></div>
          <div class="field-box" style="grid-column:span 2"><div class="field-label">Device</div><div class="field-val">${a.device}</div></div>
          <div class="field-box"><div class="field-label">Device Status</div><div class="field-val ${devColor}">${a.device_status}</div></div>
        </div>
      </div>

      <div class="ai-panel">
        <div class="ai-header">
          <span class="ai-icon">◈</span>
          <span class="ai-title">// CIPHERWATCH AI — INVESTIGATION ENGINE</span>
          <span class="ai-status" id="ai-status">READY</span>
        </div>
        <div class="ai-body" id="ai-body">
          <button class="ai-start-btn" onclick="runAI('${a.id}')">▶ &nbsp; RUN AI INVESTIGATION</button>
        </div>
      </div>
    </div>
  `;
}

function runAI(id) {
  if (aiRunning) return;
  aiRunning = true;
  const a = alerts.find(x => x.id === id);
  const body = document.getElementById('ai-body');
  const status = document.getElementById('ai-status');
  status.textContent = 'ANALYZING...';
  status.className = 'ai-status thinking';

  const verdictIcon = a.verdict === 'malicious' ? '⚑ VERDICT: MALICIOUS' : a.verdict === 'suspicious' ? '⚠ VERDICT: SUSPICIOUS' : '✓ VERDICT: LIKELY BENIGN';
  body.innerHTML = `
    <div class="ai-steps" id="ai-steps"></div>
    <div class="ai-verdict ${a.verdict}" id="ai-verdict" style="display:none">
      <div class="verdict-label ${a.verdict}">${verdictIcon}</div>
      <div class="verdict-text">${a.verdictText}</div>
      <div class="verdict-actions">${a.verdictActions.map(v=>`<span class="verdict-action ${v.cls}">${v.label}</span>`).join('')}</div>
    </div>`;

  const stepsEl = document.getElementById('ai-steps');
  a.steps.forEach((step, i) => {
    const el = document.createElement('div');
    el.className = 'ai-step';
    el.innerHTML = `<div class="ai-step-num">0${i+1}</div><div><div class="ai-step-label">${step.label}</div><div class="ai-step-text">${step.text}</div></div>`;
    stepsEl.appendChild(el);
  });

  let i = 0;
  function showNext() {
    const steps = stepsEl.querySelectorAll('.ai-step');
    if (i < steps.length) {
      steps[i].classList.add('visible');
      i++;
      setTimeout(showNext, 850 + Math.random() * 350);
    } else {
      setTimeout(() => {
        status.textContent = a.verdict.toUpperCase();
        status.className = 'ai-status';
        status.style.color = a.verdict === 'malicious' ? 'var(--red)' : a.verdict === 'suspicious' ? 'var(--amber)' : 'rgba(0,255,136,0.7)';
        const verdict = document.getElementById('ai-verdict');
        verdict.style.display = 'block';
        setTimeout(() => verdict.classList.add('visible'), 60);
        aiRunning = false;
      }, 400);
    }
  }
  setTimeout(showNext, 500);
}

function filterAlerts(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAlerts();
}

function updateClock() {
  const n = new Date();
  const p = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent = `${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())} UTC`;
}
setInterval(updateClock, 1000);
updateClock();
renderAlerts();
</script>
